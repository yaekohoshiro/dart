name: student_flow
description: Приложение для студентов - расписание, дедлайны, преподаватели.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  path_provider: ^2.1.5
  
  flutter_localizations:  # ← Добавь эту строку
    sdk: flutter
  # Управление состоянием
  provider: ^6.0.5
  
  # Локальная база данных
  sqflite: ^2.3.0
  path: ^1.8.3
  sqflite_common_ffi: ^2.3.0
  
  # Форматирование дат
  intl: ^0.20.2
  
  # Шрифты
  google_fonts: ^6.1.0
  
  # Запуск звонков и ссылок
  url_launcher: ^6.2.1
  
  # Сохранение настроек
  shared_preferences: ^2.2.2
  
  # Иконки
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true